name: AI Security Radar Weekly Report

on:
  schedule:
    # Mondays at 07:30 MDT-ish (13:30 UTC)
    - cron: "30 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate weekly report from issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/weekly_report.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "ai-security-radar-bot"
            git config user.email "ai-security-radar-bot@users.noreply.github.com"
            git add -A
            git commit -m "Weekly radar report"
            git push
          else
            echo "No changes to commit."
          fi
