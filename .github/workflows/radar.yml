name: AI Security Radar

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run collector
        env:
          # Make the built-in Actions token visible to your Python script
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_REPOSITORY is already set by Actions, but keeping it explicit is harmless
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/collect.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "ai-security-radar-bot"
            git config user.email "ai-security-radar-bot@users.noreply.github.com"
            git add -A
            git commit -m "Radar update"
            git push
          else
            echo "No changes to commit."
          fi
